[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0 # This command lists all devices in /dev/ttyUSB* and sets the first one as the upload port. It's used to automatically select the correct USB port for uploading the firmware.
#usbipd list
#usbipd attach --wsl --busid=<BUSID>
# To find the BUSID, run 'usbipd list' in PowerShell and look for the ESP32 device. 
#The BUSID will be in the format '1-1.2' or similar. 
lib_deps =
    MFRC522
    adafruit/Adafruit SSD1306 @ ^2.5.16
